image: ${CI_DEPENDENCY_PROXY_GROUP_IMAGE_PREFIX}/node:23

workflow:
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH

pages:
  stage: deploy
  tags:
    - docker
  script:
    - npm install
    - npm run build
    - rm -rf node_modules
    # GitLab Pages requires the site to be served from public/
    - mkdir -p public
    - cp index.html public/
    - cp -r dist public/
    - '[ -d img ] && cp -r img public/ || true'
    - '[ -d plugin ] && cp -r plugin public/ || true'
  artifacts:
    paths:
      - public
  environment:
    name: production
    url: $CI_PAGES_URL
